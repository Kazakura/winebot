<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Guide</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #000; -webkit-tap-highlight-color: transparent; }
        .header { position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; z-index: 100; height: 45px; }
        #back { color: #007aff; cursor: pointer; display: none; font-size: 25px; margin-right: 15px; font-weight: bold; padding: 5px; }
        .category { background: #f4f4f5; padding: 8px 15px; font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; }
        .item { padding: 18px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; background: #fff; }
        .item:active { background: #f0f0f0; }
        #content { padding: 15px; line-height: 1.6; font-size: 18px; }
        #content img { width: 100%; border-radius: 12px; margin: 15px 0; display: block; cursor: zoom-in; }

        /* ЗУМ СЛОЙ */
        #zoom-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
        #zoom-layer.active { display: flex; }
        #zoom-layer img { max-width: 98%; max-height: 98%; object-fit: contain; }
        
        .loading { padding: 50px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div id="zoom-layer" onclick="this.classList.remove('active')">
    <img src="" id="zoom-img">
</div>

<div class="header">
    <span id="back" onclick="showMenu()">‹ Назад</span>
    <b id="title">Обучение</b>
</div>

<div id="main"><div class="loading">Загрузка данных...</div></div>

<script>
    const tg = window.Telegram.WebApp;
    // Твоя ссылка на таблицу
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&v=' + Date.now();
    const GH_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
    
    let db = [];
    tg.expand();

    // 1. ЗАГРУЗКА И ПАРСИНГ (Под поля: Category, Title, File, Folder)
    fetch(CSV_URL).then(r => r.text()).then(text => {
        const rows = text.split('\n').filter(r => r.trim() !== '');
        
        db = rows.slice(1).map(row => {
            const cols = row.split(',').map(c => c.trim());
            return {
                category: cols[0] || "Разное",
                title: cols[1] || "",
                file: cols[2] || "",
                folder: cols[3] || ""
            };
        }).filter(i => i.title && i.file); // Оставляем только рабочие строки

        if (db.length > 0) showMenu();
        else document.getElementById('main').innerHTML = "Таблица пуста или не опубликована как CSV";
    }).catch(e => {
        document.getElementById('main').innerHTML = "Ошибка связи: " + e;
    });

    // 2. МЕНЮ
    function showMenu() {
        const m = document.getElementById('main');
        m.innerHTML = "";
        document.getElementById('back').style.display = "none";
        document.getElementById('title').innerText = "Обучение";

        const categories = [...new Set(db.map(i => i.category))];
        categories.forEach(cat => {
            const h = document.createElement('div');
            h.className = 'category'; h.innerText = cat;
            m.appendChild(h);
            
            db.filter(i => i.category === cat).forEach(item => {
                const d = document.createElement('div');
                d.className = 'item';
                // Привязываем данные к кнопке
                d.onclick = () => openArt(item.folder, item.file, item.title);
                d.innerHTML = `<span>${item.title}</span><span style="color:#ccc">›</span>`;
                m.appendChild(d);
            });
        });
    }

    // 3. ОТКРЫТИЕ СТАТЬИ
    function openArt(folder, file, title) {
        const m = document.getElementById('main');
        m.innerHTML = "<div class='loading'>Загрузка контента...</div>";
        document.getElementById('back').style.display = "block";
        document.getElementById('title').innerText = title;

        // Прямой путь к файлу: ROOT + Folder + / + File
        const url = `${GH_ROOT}${folder}/${file}`;
        
        fetch(url).then(r => r.text()).then(html => {
            m.innerHTML = `<div id="content">${html}</div>`;
            window.scrollTo(0,0);
        }).catch(() => { m.innerHTML = "Файл не найден по адресу: " + url; });
    }

    // 4. МАСШТАБИРОВАНИЕ (ЗУМ)
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'IMG' && e.target.id !== 'zoom-img') {
            const layer = document.getElementById('zoom-layer');
            document.getElementById('zoom-img').src = e.target.src;
            layer.classList.add('active');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
    });
</script>

</body>
</html>
