<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        h1 { color: #333; }
        
        /* Контейнер для картинки */
        .img-container { position: relative; display: inline-block; margin-top: 20px; }
        
        /* Маленькая картинка */
        .thumb { width: 200px; border-radius: 10px; cursor: pointer; border: 2px solid #eee; }

        /* ЧИСТЫЙ CSS ЗУМ (Без JS вообще) */
        .zoom-check { display: none; }
        .full-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
        .full-screen img { max-width: 95%; max-height: 95%; object-fit: contain; }

        /* Магия: если чекбокс нажат, показываем зум */
        .zoom-check:checked ~ .full-screen { display: flex; }
    </style>
</head>
<body>

    <h1>Проверка связи</h1>
    <p>Если ты видишь этот текст, значит страница ожила!</p>

    <div class="img-container">
        <input type="checkbox" id="zoom-trigger" class="zoom-check">
        
        <label for="zoom-trigger">
            <img src="https://raw.githubusercontent.com/Kazakura/winebot/main/country/argentina_map.jpg" class="thumb">
            <p style="color: blue;">Нажми на карту для зума</p>
        </label>

        <label for="zoom-trigger" class="full-screen">
            <img src="https://raw.githubusercontent.com/Kazakura/winebot/main/country/argentina_map.jpg">
        </label>
    </div>

</body>
</html>
