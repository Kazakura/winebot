<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Guide</title>
    <style>
        /* Базовые стили */
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #000; }
        .header { position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; z-index: 100; }
        #back { color: #007aff; cursor: pointer; display: none; font-size: 25px; margin-right: 15px; font-weight: bold; }
        
        /* Стили меню */
        .category { background: #f4f4f5; padding: 8px 15px; font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        .item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }
        
        /* Статья и КАРТИНКИ */
        #content { padding: 15px; line-height: 1.6; font-size: 17px; }
        #content img { 
            width: 100%; 
            border-radius: 8px; 
            margin: 10px 0; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        /* CSS ZOOM LAYER (Оверлей) */
        #zoom-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; /* Скрыт по умолчанию */
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #zoom-layer img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 4px;
        }
        /* Показываем оверлей, когда у него есть класс .active */
        #zoom-layer.active {
            display: flex;
        }
    </style>
</head>
<body>

<div id="zoom-layer" onclick="this.classList.remove('active')">
    <img src="" id="zoom-img">
</div>

<div class="header">
    <span id="back" onclick="showMenu()">‹ Назад</span>
    <b id="title">Обучение</b>
</div>

<div id="main">Загрузка...</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&v=' + Date.now();
    const GH_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
    
    let data = [];

    // 1. Загрузка таблицы
    fetch(CSV_URL).then(r => r.text()).then(text => {
        const rows = text.split('\n');
        const head = rows[0].split(',').map(h => h.trim());
        data = rows.slice(1).map(row => {
            const cols = row.split(',');
            let obj = {};
            head.forEach((h, i) => obj[h] = cols[i] ? cols[i].trim() : "");
            return obj;
        }).filter(i => i.Title);
        showMenu();
    }).catch(e => document.getElementById('main').innerHTML = "Ошибка таблицы");

    // 2. Отображение меню
    function showMenu() {
        const m = document.getElementById('main');
        m.innerHTML = "";
        document.getElementById('back').style.display = "none";
        document.getElementById('title').innerText = "Обучение";

        const cats = [...new Set(data.map(i => i.Category))].filter(c => c);
        cats.forEach(c => {
            const h = document.createElement('div');
            h.className = 'category'; h.innerText = c;
            m.appendChild(h);

            data.filter(i => i.Category === c).forEach(item => {
                const d = document.createElement('div');
                d.className = 'item';
                d.innerHTML = `<span>${item.Title}</span><span>›</span>`;
                d.onclick = () => openArt(item.Folder, item.File, item.Title);
                m.appendChild(d);
            });
        });
    }
