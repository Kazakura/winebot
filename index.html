<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Education</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Фиксированная шапка */
        .header { 
            position: sticky; top: 0; background: var(--bg); 
            padding: 10px 15px; border-bottom: 1px solid var(--sec); 
            z-index: 1000; display: flex; align-items: center; height: 45px;
        }
        #back { color: var(--link); cursor: pointer; display: none; font-size: 35px; margin-right: 15px; line-height: 1; }
        #head-title { font-size: 17px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Меню */
        .cat { background: var(--sec); padding: 8px 15px; font-size: 11px; color: var(--hint); text-transform: uppercase; font-weight: bold; }
        .row { padding: 16px; border-bottom: 0.5px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; background: var(--bg); }
        .row:active { background: var(--sec); }

        /* Статья */
        #content { padding: 20px; line-height: 1.6; font-size: 18px; }
        #content img { 
            width: 100% !important; height: auto !important; 
            border-radius: 10px; margin: 15px 0; 
            display: block; cursor: pointer;
        }

        /* Полноэкранный просмотр */
        #zoom-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; 
            display: none; align-items: center; justify-content: center; 
        }
        #zoom-layer img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .loader { padding: 50px; text-align: center; color: var(--hint); }
    </style>
</head>
<body>

        <img src="" id="zoom-img">
    </div>

    <div class="header">
        <span id="back" onclick="goMenu()">‹</span>
        <div id="head-title">Обучение</div>
    </div>

    <div id="app"><div class="loader">Синхронизация...</div></div>
