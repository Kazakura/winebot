<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Guide</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 15px; border-bottom: 1px solid var(--sec); z-index: 1000; display: flex; align-items: center; height: 45px; }
        #back { color: var(--link); cursor: pointer; display: none; font-size: 30px; margin-right: 15px; font-weight: bold; }
        
        .cat-v { background: var(--sec); padding: 8px 15px; font-size: 11px; color: var(--hint); text-transform: uppercase; font-weight: bold; }
        .row-v { padding: 18px 15px; border-bottom: 0.5px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; background: var(--bg); }
        
        #content { padding: 20px; line-height: 1.6; font-size: 18px; }
        #content img { width: 100%; border-radius: 12px; margin: 15px 0; display: block; }

        /* ЗУМ */
        #zoom-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; touch-action: none; }
        #zoom-img { width: 100%; height: 100%; object-fit: contain; will-change: transform; transition: transform 0.1s ease-out; }
        .close-zoom { position: absolute; top: 30px; right: 20px; color: #fff; font-size: 40px; z-index: 10001; }

        /* ОТЛАДКА */
        #debug { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #0f0; font-size: 10px; font-family: monospace; max-height: 100px; overflow: auto; z-index: 10002; padding: 5px; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug">Лог системы:</div>

<div id="zoom-wrap" onclick="closeZoom()">
    <span class="close-zoom">&times;</span>
    <img src="" id="zoom-img">
</div>

<div class="header">
    <span id="back" onclick="showMain()">‹</span>
    <div id="title">Wine Guide</div>
</div>

<div id="app-view" style="padding-bottom: 100px;">
    <div style="text-align:center; padding: 50px; color: #888;">Загрузка...</div>
</div>

<script>
    const log = (msg) => { document.getElementById('debug').innerHTML += '<br>' + msg; };
    const tg = window.Telegram.WebApp;
    // Твоя CSV ссылка
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv';
    const GITHUB_BASE = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
    
    let db = [];

    async function start() {
        log('1. Запуск системы...');
        tg.expand();
        tg.ready();

        try {
            log('2. Запрос к Google Sheets...');
            const response = await fetch(SHEET_URL + '&v=' + Date.now());
            if (!response.ok) throw new Error('Ошибка сети: ' + response.status);
            
            const text = await response.text();
            log('3. Данные получены, парсинг...');
            
            const rows = text.split('\n').map(r => r.trim()).filter(r => r);
            db = rows.slice(1).map(row => {
                const c = row.split(','); // Category, Title, File, Folder
                return { cat: c[0], name: c[1], file: c[2], folder: c[3] };
            }).filter(i => i.name && i.file);

            log('4. Загружено строк: ' + db.length);
            showMain();
        } catch (e) {
            log('ОШИБКА: ' + e.message);
            document.getElementById('app-view').innerHTML = '<div style="color:red; padding:20px;">Ошибка: ' + e.message + '</div>';
        }
    }

    function showMain() {
        const app = document.getElementById('app-view');
        app.innerHTML = "";
        document.getElementById('back').style.display = "none";
