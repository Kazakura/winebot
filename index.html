<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; color: #000; }
        .btn { display: block; padding: 15px; background: #007aff; color: #fff; text-align: center; border-radius: 8px; margin-bottom: 10px; text-decoration: none; cursor: pointer; }
        #content img { width: 100%; border-radius: 10px; cursor: zoom-in; }
        #zoom { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:9999; }
        #zoom img { max-width:100%; max-height:100%; }
    </style>
</head>
<body>

    <div id="zoom" onclick="this.style.display='none'"><img src="" id="zimg"></div>
    <div id="root">Загрузка...</div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&v=' + Date.now();
        const GH = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';

        async function start() {
            const root = document.getElementById('root');
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const lines = text.split('\n').slice(1);
                
                root.innerHTML = '<h2>Меню:</h2>';
                lines.forEach(line => {
                    const [cat, title, folder, file] = line.split(',');
                    if (!title) return;
                    const b = document.createElement('div');
                    b.className = 'btn';
                    b.innerText = title.trim();
                    b.onclick = () => load(folder.trim(), file.trim());
                    root.appendChild(b);
                });
            } catch (e) {
                root.innerHTML = 'Ошибка загрузки CSV: ' + e.message;
            }
        }

        async function load(f, name) {
            const root = document.getElementById('root');
            root.innerHTML = 'Загрузка статьи...';
            try {
                const res = await fetch(`${GH}${f}/${name}`);
                const html = await res.text();
                root.innerHTML = `<div onclick="start()" style="color:blue; margin-bottom:10px;">← Назад</div><div id="content">${html}</div>`;
            } catch (e) {
                root.innerHTML = 'Ошибка файла: ' + e.message;
            }
        }

        // ЗУМ
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG' && e.target.id !== 'zimg') {
                document.getElementById('zimg').src = e.target.src;
                document.getElementById('zoom').style.display = 'flex';
            }
        });

        start();
    </script>
</body>
</html>
