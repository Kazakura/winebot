<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Base</title>
    <style>
        body { background: #fff; color: #222; font-family: sans-serif; margin: 0; padding: 0; }
        .header { position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; z-index: 100; }
        #back { color: #007aff; cursor: pointer; display: none; font-size: 24px; margin-right: 15px; font-weight: bold; }
        .chapter { background: #f4f4f5; padding: 8px 15px; font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        #content { padding: 15px; line-height: 1.6; font-size: 17px; }
        #content img { width: 100%; border-radius: 8px; margin: 10px 0; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000; }
        #overlay img { max-width:100%; max-height:100%; }
        .msg { padding: 50px; text-align: center; color: #666; }
        .err { color: red; padding: 20px; }
    </style>
</head>
<body>

<div id="overlay" onclick="this.style.display='none'"><img src=""></div>

<div class="header">
    <span id="back" onclick="goBack()">‹ Назад</span>
    <strong id="title">Обучение</strong>
</div>

<div id="view"><div class="msg">Загрузка...</div></div>

<script>
    // ССЫЛКИ - Проверь их!
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&cache=' + Math.random();
    const GH_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';

    let data = [];

    // Парсим CSV вручную без библиотек
    function parseCSV(str) {
        const rows = str.split('\n').map(row => row.split(','));
        const head = rows[0].map(h => h.trim());
        return rows.slice(1).map(row => {
            let obj = {};
            head.forEach((h, i) => obj[h] = row[i] ? row[i].trim() : "");
            return obj;
        });
    }

    // Меню
    function showMenu() {
        const v = document.getElementById('view');
        v.innerHTML = "";
        document.getElementById('back').style.display = "none";
        document.getElementById('title').innerText = "Обучение";

        let cats = [...new Set(data.map(i => i.Category))].filter(c => c);
        cats.forEach(c => {
            v.innerHTML += `<div class="chapter">${c}</div>`;
            data.filter(i => i.Category === c).forEach(item => {
                if(!item.Title) return;
                let d = document.createElement('div');
                d.className = 'item';
                d.innerHTML = `<span>${item.Title}</span><span>›</span>`;
                d.onclick = () => loadArticle(item.Folder, item.File, item.Title);
                v.appendChild(d);
            });
        });
    }

    // Статья
    async function loadArticle(f, name, t) {
        const v = document.getElementById('view');
        v.innerHTML = "<div class='msg'>Загрузка статьи...</div>";
        document.getElementById('back').style.display = "block";
        document.getElementById('title').innerText = t;

        try {
            const res = await fetch(`${GH_ROOT}${f}/${name}`);
            const html = await res.text();
            v.innerHTML = `<div id="content">${html}</div>`;
            
            // Зум картинок
            document.querySelectorAll('#content img').forEach(img => {
                img.onclick = (e) => {
                    e.stopPropagation();
                    const ov = document.getElementById('overlay');
                    ov.querySelector('img').src = img.src;
                    ov.style.display = 'flex';
                }
            });
        } catch(e) { v.innerHTML = "<div class='err'>Ошибка файла</div>"; }
    }

    function goBack() { showMenu(); }

    // Старт
    async function start() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            data = parseCSV(text).filter(r => r.Title);
            if(data.length > 0) showMenu();
            else document.getElementById('view').innerHTML = "<div class='err'>Таблица пуста</div>";
        } catch(e) {
