<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Library</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Шапка */
        .header { 
            position: sticky; top: 0; background: var(--bg); 
            padding: 10px 15px; border-bottom: 1px solid var(--sec); 
            z-index: 1000; display: flex; align-items: center; height: 45px; 
        }
        #back { color: var(--link); cursor: pointer; display: none; font-size: 30px; margin-right: 15px; font-weight: bold; }
        #title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Список */
        .cat-v { background: var(--sec); padding: 8px 15px; font-size: 11px; color: var(--hint); text-transform: uppercase; font-weight: bold; }
        .row-v { padding: 18px 15px; border-bottom: 0.5px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; background: var(--bg); }
        
        /* Фрейм для документов */
        #doc-container { width: 100%; height: calc(100vh - 65px); border: none; display: none; }
        #main-list { height: calc(100vh - 65px); overflow-y: auto; }

        /* Отладка */
        #debug { position: fixed; bottom: 0; width: 100%; background: #000; color: #0f0; font-size: 9px; padding: 5px; z-index: 10001; display: none; }
    </style>
</head>
<body>

<div id="debug">Лог: </div>

<div class="header">
    <span id="back" onclick="showMain()">‹</span>
    <div id="title">Загрузка...</div>
</div>

<div id="main-list">
    <div style="text-align:center; padding:50px; color:#888;">Синхронизация с таблицей...</div>
</div>

<iframe id="doc-container"></iframe>

<script>
    const tg = window.Telegram.WebApp;
    const log = (m) => { document.getElementById('debug').innerHTML += m + ' | '; };
    
    // ССЫЛКИ
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv';
    const GITHUB_RAW = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
    
    let db = [];

    async function init() {
        tg.expand();
        tg.ready();
        try {
            const res = await fetch(SHEET_URL + '&nocache=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n').filter(r => r.trim());
            
            db = rows.slice(1).map(row => {
                const c = row.split(',').map(s => s.trim());
                return { cat: c[0], name: c[1], file: c[2], folder: c[3] };
            }).filter(i => i.name && i.file);

            showMain();
        } catch (e) {
            document.getElementById('main-list').innerHTML = `<div style="padding:20px; color:red;">Ошибка таблицы. Проверьте публикацию CSV.</div>`;
        }
    }

    function showMain() {
        const list = document.getElementById('main-list');
        const frame = document.getElementById('doc-container');
        list.style.display = "block";
        frame.style.display = "none";
        frame.src = ""; // Очищаем память
        
        list.innerHTML = "";
        document.getElementById('back').style.display = "none";
        document.getElementById('title').innerText = "Обучение Кависта";

        const cats = [...new Set(db.map(i => i.cat))];
        cats.forEach(cat => {
            const h = document.createElement('div');
            h.className = 'cat-v'; h.innerText = cat || "Разное";
            list.appendChild(h);
            
            db.filter(i => i.cat === cat).forEach(item => {
                const r = document.createElement('div');
                r.className = 'row-v';
                r.innerHTML = `<span>${item.name}</span><span style="color:#ccc">›</span>`;
                r.onclick = () => openFile(item.folder, item.file, item.name);
                list.appendChild(r);
            });
        });
    }

    function openFile(folder, file, name) {
        const list = document.getElementById('main-list');
        const frame = document.getElementById('doc-container');
        const title = document.getElementById('title');
        const back = document.getElementById('back');

        list.style.display = "none";
        frame.style.display = "block";
        back.style.display = "block";
        title.innerText = name;

        const fileUrl = `${GITHUB_RAW}${folder}/${file}`;
        
        // Если это PDF или Word (docx/doc), используем вьюер Google
        if (file.match(/\.(pdf|docx|doc|xlsx)$/i)) {
            frame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(fileUrl)}&embedded=true`;
        } else {
            // Если это обычный HTML, открываем напрямую
            frame.src = fileUrl;
        }
    }

    init();
</script>

</body>
</html>
