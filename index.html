<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Base System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка приложения */
        .header { 
            position: sticky; top: 0; background: var(--bg); 
            padding: 10px 15px; border-bottom: 1px solid var(--sec); 
            z-index: 1000; display: flex; align-items: center; height: 45px;
        }
        #back { 
            color: var(--link); cursor: pointer; display: none; 
            font-size: 32px; margin-right: 12px; font-weight: bold; line-height: 1;
        }
        .header strong { font-size: 17px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Элементы меню */
        .category-label { background: var(--sec); padding: 8px 15px; font-size: 11px; color: var(--hint); text-transform: uppercase; font-weight: 700; }
        .menu-item { padding: 16px; border-bottom: 0.5px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
        .menu-item:active { background: var(--sec); }
        .arrow { opacity: 0.2; font-size: 20px; }

        /* Контент статьи */
        #content { padding: 20px; line-height: 1.6; font-size: 18px; max-width: 800px; margin: 0 auto; }
        #content img { 
            display: block; width: 100% !important; height: auto !important; 
            border-radius: 12px; margin: 20px 0; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Полноэкранный просмотр фото */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.96); z-index: 10001; 
            display: none; align-items: center; justify-content: center;
        }
        #overlay img { max-width: 95%; max-height: 90%; object-fit: contain; border-radius: 4px; }

        .loading { padding: 60px; text-align: center; color: var(--hint); font-size: 15px; }
        .error-msg { color: #cc0000; padding: 30px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="overlay-img" src="" alt="Full size">
    </div>

    <div class="header">
        <span id="back">‹</span>
        <strong id="head-title">База знаний</strong>
    </div>

    <div id="view">
        <div class="loading">Загрузка данных...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&nocache=' + Date.now();
        const GH_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';

        let lessonsData = [];

        tg.expand();
        tg.ready();

        // 1. Простой парсинг CSV
        function parseCSV(text) {
            const rows = text.split(/\r?\n/);
            const headers = rows[0].split(',').map(h => h.trim());
            return rows.slice(1).map(row => {
                const cols = row.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = cols[i] ? cols[i].trim() : "");
                return obj;
            });
        }

        // 2. Отрисовка меню
        function showMenu() {
            const container = document.getElementById('view');
            container.innerHTML = "";
            document.getElementById('back').style.display = "none";
            document.getElementById('head-title').innerText = "Обучение";

            const categories = [...new Set(lessonsData.map(l => l.Category))].filter(c => c);
            
            categories.forEach(cat => {
                const label = document.createElement('div');
                label.className = "category-label";
                label.innerText = cat;
                container.appendChild(label);

                lessonsData.filter(l => l.Category === cat).forEach(item => {
                    if (!item.Title) return;
                    const div = document.createElement('div');
                    div.className = "menu-item";
                    div.innerHTML = `<span>${item.Title}</span><span class="arrow">›</span>`;
                    div.onclick = () => openLesson(item.Folder, item.File, item.Title);
                    container.appendChild(div);
                });
            });
        }

        // 3. Загрузка статьи
        async function openLesson(folder, file, title) {
            const container = document.getElementById('view');
            container.innerHTML = "<div class='loading'>Загрузка контента...</div>";
            document.getElementById('back').style.display = "block";
            document.getElementById('head-title').innerText = title;

            const path = `${GH_ROOT}${folder || 'country'}/${file}`;

            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error();
                const html = await res.text();
                container.innerHTML = `<div id="content">${html}</div>`;
                window.scrollTo(0, 0);
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Ошибка: файл ${folder}/${file} не найден.</div>`;
            }
        }

        document.addEventListener('click', (e) => {
            // Если кликнули по картинке
            if (e.target.tagName === 'IMG') {
                const overlay = document.getElementById('overlay');
                const overlayImg = document.getElementById('overlay-img');
                
                // Если мы
