<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg: var(--tg-theme-bg-color, #fff); --text: var(--tg-theme-text-color, #000); --sec: var(--tg-theme-secondary-bg-color, #f0f0f0); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        .header { padding: 15px; border-bottom: 1px solid var(--sec); display: flex; align-items: center; }
        .back-btn { color: #3390ec; cursor: pointer; display: none; margin-right: 15px; font-weight: bold; }
        .menu-item { padding: 15px; border-bottom: 1px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; }
        #view { padding: 10px; }
        #content img { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <span id="back" class="back-btn">← Назад</span>
        <strong id="head-title">WineLeaf</strong>
    </div>
    <div id="view">Загрузка данных...</div>

    <script>
        const tg = window.Telegram.WebApp;
        // Твоя ссылка
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv';

        let rawData = [];

        tg.expand();

        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            complete: (results) => {
                rawData = results.data.filter(r => r.Category); // Убираем пустые
                if (rawData.length === 0) {
                    document.getElementById('view').innerHTML = "Таблица пуста или заголовки (Category, Title, Content) неверны.";
                } else {
                    renderMenu();
                }
            },
            error: (err) => {
                document.getElementById('view').innerHTML = "Ошибка связи с Google: " + err;
            }
        });

        function renderMenu() {
            const container = document.getElementById('view');
            container.innerHTML = "";
            document.getElementById('back').style.display = "none";
            const categories = [...new Set(rawData.map(item => item.Category))];
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = "menu-item";
                div.innerHTML = `<span>📂 ${cat}</span> <span>❯</span>`;
                div.onclick = () => renderCategory(cat);
                container.appendChild(div);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('view');
            container.innerHTML = "";
            document.getElementById('back').style.display = "inline";
            rawData.filter(i => i.Category === catName).forEach(art => {
                const div = document.createElement('div');
                div.className = "menu-item";
                div.innerHTML = `<span>📄 ${art.Title}</span>`;
                div.onclick = () => {
                    container.innerHTML = `<div id="content">${marked.parse(art.Content || '')}</div>`;
                };
                container.appendChild(div);
            });
        }

        document.getElementById('back').onclick = () => renderMenu();
    </script>
</body>
</html>
