<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Guide</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #000; -webkit-tap-highlight-color: transparent; }
        .header { position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; z-index: 100; height: 45px; }
        #back { color: #007aff; cursor: pointer; display: none; font-size: 25px; margin-right: 15px; font-weight: bold; }
        .category { background: #f4f4f5; padding: 8px 15px; font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        .item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }
        
        /* КОНТЕНТ СТАТЬИ */
        #main { min-height: 200px; }
        #content { padding: 15px; line-height: 1.6; font-size: 17px; }
        #content img { width: 100%; border-radius: 8px; margin: 10px 0; cursor: zoom-in; display: block; }

        /* СЛОЙ МАСШТАБИРОВАНИЯ (ZOOM) */
        #zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
        #zoom-overlay.active { display: flex; }
        #zoom-overlay img { max-width: 98%; max-height: 98%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .loading { padding: 50px; text-align: center; color: #999; }
    </style>
</head>
