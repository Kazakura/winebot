<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>База Знаний Кависта</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --accent: #800020; /* Цвет марсала для акцентов */
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Шапка */
        .header { 
            position: sticky; 
            top: 0; 
            background: var(--bg); 
            padding: 15px; 
            border-bottom: 1px solid var(--sec); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            height: 30px;
        }
        .back-btn { 
            color: var(--link); 
            cursor: pointer; 
            display: none; 
            font-size: 28px; 
            margin-right: 15px; 
            line-height: 1;
        }
        .header strong { font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }

        /* Оглавление */
        .chapter-title { 
            background: var(--sec); 
            padding: 10px 15px; 
            font-weight: 600; 
            font-size: 12px; 
            color: var(--hint); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .menu-item { 
            padding: 16px; 
            border-bottom: 0.5px solid var(--sec); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: var(--bg);
        }
        .menu-item:active { background: var(--sec); }
        .arrow { color: var(--hint); font-size: 16px; opacity: 0.5; }

        /* Контент Статьи */
        #content { 
            padding: 20px; 
            line-height: 1.6; 
            font-size: 18px; 
            max-width: 700px; 
            margin: 0 auto;
            animation: fadeIn 0.2s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #content h1, #content h2 { color: var(--accent); border-bottom: 1px solid var(--sec); padding-bottom: 8px; margin-top: 1.5em; }
        #content p { margin-bottom: 1em; }
        #content img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            cursor: zoom-in;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #content table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 16px; overflow-x: auto; display: block; }
        #content td, #content th { border: 1px solid var(--sec); padding: 10px; text-align: left; }

        /* Просмотр фото */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; 
            display: none; align-items: center; justify-content: center; 
        }
        #overlay img { max-width: 98%; max-height: 98%; border-radius: 4px; }

        .loader { padding: 60px 20px; text-align: center; color: var(--hint); font-size: 16px; }
    </style>
</head>
<body>

    <div id="overlay"><img></div>

    <div class="header">
        <span id="back" class="back-btn">‹</span>
        <strong id="head-title">База знаний</strong>
    </div>

    <div id="view">
        <div class="loader">Синхронизация данных...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // --- ПУТИ К ДАННЫМ ---
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv';
        const GITHUB_RAW_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
        // ---------------------

        let rawData = [];
        tg.expand();
        tg.ready();

        // Загрузка структуры из Google Таблицы
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                rawData = results.data.filter(r => r.Category && r.Title && r.File && r.Folder);
                renderMainPage();
            },
            error: () => {
                document.getElementById('view').innerHTML = "<div class='loader'>Ошибка подключения к базе.</div>";
            }
        });

        // Главное меню (Оглавление)
        function renderMainPage() {
            const container = document.getElementById('view');
            container.innerHTML = "";
            document.getElementById('back').style.display = "none";
            document.getElementById('head-title').innerText = "Обучение";

            const categories = [...new Set(rawData.map(item => item.Category))];

            categories.forEach(cat => {
                const head = document.createElement('div');
                head.className = "chapter-title";
                head.innerText = cat;
                container.appendChild(head);

                rawData.filter(i => i.Category === cat).forEach(lesson => {
                    const div = document.createElement('div');
                    div.className = "menu-item";
                    div.innerHTML = `<span>${lesson.Title}</span> <span class="arrow">›</span>`;
                    div.onclick = () => loadAnyLesson(lesson.Folder, lesson.File, lesson.Title);
                    container.appendChild(div);
                });
            });
        }

        // Загрузка HTML-файла (Вино, Виски, Кофе и т.д.)
        async function loadAnyLesson(folder, fileName, title) {
            const container = document.getElementById('view');
            document.getElementById('back').style.display = "block";
            document.getElementById('head-title').innerText = title;
            container.innerHTML = "<div class='loader'>Открываем...</div>";

            const fullUrl = `${GITHUB_RAW_ROOT}${folder}/${fileName}`;

            try {
                const response = await fetch(fullUrl);
                if (!response.ok) throw new Error('404');

                const html = await response.text();
                container.innerHTML = `<div id="content">${html}</div>`;
                window.scrollTo(0, 0);
                
            } catch (err) {
                container.innerHTML = `
                    <div class='loader'>
                        <strong>Материал не найден</strong><br>
                        <small style="display:block; margin-top:10px; color:red">
                            Путь: ${folder}/${fileName}
                        </small>
                    </div>`;
            }
        }

        // Кнопка Назад
        document.getElementById('back').onclick = () => {
            renderMainPage();
            window.scrollTo(0, 0);
        };

        // Увеличение фото во весь экран
        const overlay = document.getElementById('overlay');
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG' && e.target.closest('#content')) {
                overlay.querySelector('img').src = e.target.src;
                overlay.style.display = 'flex';
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        });
        overlay.onclick = () => overlay.style.display = 'none';

    </script>
</body>
</html>
