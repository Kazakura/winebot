<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Guide</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #000; -webkit-tap-highlight-color: transparent; user-select: none; }
        .header { position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; z-index: 100; height: 45px; }
        #back { color: #007aff; cursor: pointer; display: none; font-size: 25px; margin-right: 15px; font-weight: bold; padding: 5px; }
        
        .category { background: #f4f4f5; padding: 8px 15px; font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; }
        
        /* КНОПКИ (Сделаны крупнее для удобства нажатия) */
        .item { 
            padding: 18px 15px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            cursor: pointer;
            background: #fff;
            active: background: #f0f0f0;
        }
        .item:active { background: #f0f0f0; }

        #content { padding: 15px; line-height: 1.6; font-size: 17px; user-select: text; }
        #content img { width: 100%; border-radius: 8px; margin: 10px 0; display: block; }

        /* ЗУМ */
        #zoom-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
        #zoom-layer.active { display: flex; }
        #zoom-layer img { max-width: 98%; max-height: 98%; object-fit: contain; }
        
        .loading { padding: 50px; text-align: center; color: #999; }
    </style>
</head>
<body>

<div id="zoom-layer" onclick="this.classList.remove('active')">
    <img src="" id="zoom-img">
</div>

<div class="header">
    <span id="back" onclick="showMenu()">‹ Назад</span>
    <b id="title">Обучение</b>
</div>

<div id="main"><div class="loading">Загрузка данных...</div></div>

<script>
    const tg = window.Telegram.WebApp;
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv&v=' + Date.now();
    const GH_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';
    
    let db = [];
    tg.expand();
    tg.ready();

    // 1. ЗАГРУЗКА
    fetch(CSV_URL).then(r => r.text()).then(text => {
        const rows = text.split('\n');
        const head = rows[0].split(',').map(h => h.trim());
        db = rows.slice(1).map(row => {
            const cols = row.split(',');
            let obj = {};
            head.forEach((h, i) => obj[h] = cols[i] ? cols[i].trim() : "");
            return obj;
        }).filter(i => i.Title);
        showMenu();
    }).catch(() => { document.getElementById('main').innerHTML = "Ошибка сети"; });

    // 2. МЕНЮ
    function showMenu() {
        const m = document.getElementById('main');
        m.innerHTML = "";
        document.getElementById('back').style.display = "none";
        document.getElementById('title').innerText = "Обучение";

        const cats = [...new Set(db.map(i => i.Category))].filter(c => c);
        cats.forEach(c => {
            const h = document.createElement('div');
            h.className = 'category'; h.innerText = c;
            m.appendChild(h);
            
            db.filter(i => i.Category === c).forEach(item => {
                const d = document.createElement('div');
                d.className = 'item';
                // Сохраняем данные прямо в атрибуты элемента, чтобы скрипт их видел
                d.setAttribute('data-folder', item.Folder);
                d.setAttribute('data-file', item.File);
                d.setAttribute('data-title', item.Title);
                d.innerHTML = `<span>${item.Title}</span><span style="color:#ccc">›</span>`;
                m.appendChild(d);
            });
        });
    }

    // 3. СТАТЬЯ
    function openArt(f, file, t) {
        const m = document.getElementById('main');
        m.innerHTML = "<div class='loading'>Загрузка контента...</div>";
        document.getElementById('back').style.display = "block";
        document.getElementById('title').innerText = t;

        fetch(GH_ROOT + f + "/" + file).then(r => r.text()).then(html => {
            m.innerHTML = `<div id="content">${html}</div>`;
