<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>База Знаний</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 15px; border-bottom: 1px solid var(--sec); display: flex; align-items: center; z-index: 10; height: 40px; }
        .back-btn { color: var(--link); cursor: pointer; display: none; font-size: 30px; margin-right: 15px; }
        .header strong { font-size: 17px; flex: 1; }
        .chapter-title { background: var(--sec); padding: 10px 15px; font-weight: 600; font-size: 12px; color: var(--hint); text-transform: uppercase; }
        .menu-item { padding: 16px; border-bottom: 0.5px solid var(--sec); cursor: pointer; display: flex; justify-content: space-between; }
        #content { padding: 20px; line-height: 1.6; font-size: 18px; }
        #content img { width: 100%; border-radius: 12px; margin: 15px 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; }
        #overlay img { max-width: 100%; max-height: 100%; }
        .loader { padding: 50px; text-align: center; color: var(--hint); }
        .error-box { padding: 20px; color: red; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div id="overlay"><img src=""></div>
    <div class="header">
        <span id="back" class="back-btn">‹</span>
        <strong id="head-title">База знаний</strong>
    </div>
    <div id="view"><div class="loader">Синхронизация...</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDwPMQ0AWNNo9AmFEDogcfbpzIqioSgkb0FCMeaOvpIpArW_n-7HIRmWDMdRDjwfSriPADz3b0RqL/pub?output=csv';
        const GITHUB_ROOT = 'https://raw.githubusercontent.com/Kazakura/winebot/main/';

        let rawData = [];
        tg.expand();

        // 1. Загрузка данных с проверкой ошибок
        Papa.parse(SHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: 'greedy', // Игнорировать пустые строки
            complete: (results) => {
                console.log("Данные:", results.data);
                // Фильтруем данные, чтобы не было пустых строк
                rawData = results.data.filter(r => r.Title && r.Title.trim() !== "");
                
                if (rawData.length === 0) {
                    document.getElementById('view').innerHTML = `
                        <div class="error-box">
                            <b>Данные не найдены!</b><br>
                            Проверьте, что в таблице есть колонки: <u>Category</u>, <u>Title</u>, <u>Folder</u>, <u>File</u>.
                        </div>`;
                } else {
                    renderMenu();
                }
            },
            error: (err) => {
                document.getElementById('view').innerHTML = `<div class="error-box">Ошибка сети: ${err}</div>`;
            }
        });

        // 2. Рендер меню
        function renderMenu() {
            const container = document.getElementById('view');
            container.innerHTML = "";
            document.getElementById('back').style.display = "none";
            document.getElementById('head-title').innerText = "Обучение";

            const categories = [...new Set(rawData.map(item => item.Category || "Разное"))];
            categories.forEach(cat => {
                const head = document.createElement('div');
                head.className = "chapter-title";
                head.innerText = cat;
                container.appendChild(head);

                rawData.filter(i => (i.Category || "Разное") === cat).forEach(lesson => {
                    const div = document.createElement('div');
                    div.className = "menu-item";
                    div.innerHTML = `<span>${lesson.Title}</span> <span>›</span>`;
                    div.onclick = () => loadLesson(lesson.Folder, lesson.File, lesson.Title);
                    container.appendChild(div);
                });
            });
        }

        // 3. Загрузка контента
        async function loadLesson(folder, file, title) {
            const container = document.getElementById('view');
            document.getElementById('back').style.display = "block";
            document.getElementById('head-title').innerText = title;
            container.innerHTML = "<div class='loader'>Загрузка контента...</div>";

            const folderPath = folder ? folder.trim() : "country";
            const fullUrl = `${GITHUB_ROOT}${folderPath}/${file.trim()}`;

            try {
                const response = await fetch(fullUrl);
                if (!response.ok) throw new Error();
                const html = await response.text();
                container.innerHTML = `<div id="content">${html}</div>`;
                window.scrollTo(0, 0);
            } catch (e) {
                container.innerHTML = `<div class="error-box">Файл не найден:<br>${folderPath}/${file}</div>`;
            }
        }

        document.getElementById('back').onclick = () => renderMenu();

        // 4. Зум картинок
        const overlay = document.getElementById('overlay');
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG' && e.target.closest('#view')) {
                overlay.querySelector('img').src = e.target.src;
                overlay.style.display = 'flex';
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        });
        overlay.onclick = () => overlay.style.display = 'none';
    </script>
</body>
</html>
