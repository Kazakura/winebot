<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учебник Кависта: Страны</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #707579);
            --link: var(--tg-theme-link-color, #3390ec);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --accent: #800020; /* Цвет выдержанного вина */
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }
        
        /* Шапка приложения */
        .header { 
            position: sticky; 
            top: 0; 
            background: var(--bg); 
            padding: 15px; 
            border-bottom: 1px solid var(--sec); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .back-btn { 
            color: var(--link); 
            cursor: pointer; 
            display: none; 
            font-size: 26px; 
            margin-right: 15px; 
            line-height: 1;
        }
        .header strong { font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Оглавление (Список стран/глав) */
        .chapter-title { 
            background: var(--sec); 
            padding: 10px 15px; 
            font-weight: 600; 
            font-size: 13px; 
            color: var(--hint); 
            text-transform: uppercase;
        }
        .menu-item { 
            padding: 16px; 
            border-bottom: 0.5px solid var(--sec); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .menu-item:active { background: var(--sec); }
        .arrow { color: var(--hint); font-size: 16px; opacity: 0.5; }

        /* Контент Урока (HTML из Word) */
        #content { 
            padding: 20px; 
            line-height: 1.6; 
            font-size: 18px; 
            max-width: 600px; 
            margin: 0 auto;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #content h1, #content h2 { color: var(--accent); border-bottom: 1px solid var(--sec); padding-bottom: 10px; }
        #content img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            cursor: zoom-in;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #content table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 16px; }
        #content td { border: 1px solid var(--sec); padding: 8px; }

        /* Просмотр фото */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; 
            display: none; align-items: center; justify-content: center; 
        }
        #overlay img { max-width: 98%; max-height: 98%; }

        .loader { padding: 50px; text-align: center; color: var(--hint); font-style: italic; }
    </style>
</head>
<body>

    <div id="overlay"><img></div>

    <div class="header">
        <span id="back" class="back-btn">‹</span>
        <strong id="head-title">Учебник Кависта</strong>
    </div>

    <div id="view">
        <div class="loader">Открываем карту вин...</div>
    </div>
